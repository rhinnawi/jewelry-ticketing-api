version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jewelry_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: jewelry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jewelry_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jewelry_user:dev_password@db:5432/jewelry_db
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    stdin_open: true
    tty: true

volumes:
  postgres_data:
